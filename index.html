<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kubota Dealer Visit CRM</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A1A2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dealer CRM">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --kubota-orange: #E85C0D;
  --kubota-dark: #1A1A2E;
  --kubota-gray: #2D2D44;
  --kubota-light: #F5F5F0;
  --accent: #FF8C42;
  --success: #2ECC71;
  --warning: #F39C12;
  --danger: #E74C3C;
  --blue: #3498DB;
  --purple: #9B59B6;
  --border: #E0DDD5;
  --text-main: #1A1A2E;
  --text-muted: #6B6B80;
  --card-bg: #FFFFFF;
  --sidebar-bg: #1A1A2E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--kubota-light); color: var(--text-main); min-height: 100vh; }
button, input, select, textarea { font-family: inherit; }
.hidden { display: none !important; }

/* ===== LOGIN SCREEN ===== */
#loginScreen {
  position: fixed; inset: 0; background: linear-gradient(135deg, #1A1A2E 0%, #2D2D44 100%);
  z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto;
}
.login-card { background: white; border-radius: 20px; padding: 40px; max-width: 520px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
.login-logo { display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom: 8px; }
.login-badge { background: var(--kubota-orange); color: white; font-weight: 800; font-size: 15px; padding: 6px 14px; border-radius: 6px; letter-spacing: 1px; }
.login-title { text-align:center; font-size: 22px; font-weight: 800; margin-top: 14px; color: var(--text-main); }
.login-sub { text-align:center; font-size: 14px; color: var(--text-muted); margin-top: 6px; margin-bottom: 28px; }
.role-grid { display:grid; grid-template-columns: 1fr; gap: 12px; }
.role-card {
  border: 2px solid var(--border); border-radius: 14px; padding: 18px 20px; cursor: pointer;
  display: flex; align-items:center; gap: 16px; transition: all 0.15s; background: white; text-align:left; width: 100%;
}
.role-card:hover { border-color: var(--kubota-orange); background: #FFF8F4; transform: translateY(-1px); }
.role-icon { font-size: 30px; width: 46px; text-align:center; flex-shrink:0; }
.role-name { font-size: 16px; font-weight: 700; color: var(--text-main); }
.role-desc { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; line-height:1.4; }
.login-step-back { font-size: 13px; color: var(--text-muted); cursor:pointer; margin-bottom: 18px; display:inline-flex; align-items:center; gap:6px; font-weight:600; }
.login-step-back:hover { color: var(--kubota-orange); }
.login-field { margin-bottom: 18px; }
.login-field label { display:block; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform:uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.login-field select, .login-field input {
  width: 100%; border: 2px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 15px; outline: none; transition: border-color .15s;
}
.login-field select:focus, .login-field input:focus { border-color: var(--kubota-orange); }
.big-btn { width:100%; padding: 14px; border-radius: 10px; border:none; background: var(--kubota-orange); color:white; font-size: 15px; font-weight:700; cursor:pointer; transition: background .15s; }
.big-btn:hover { background: #c94d08; }
.big-btn:disabled { background:#ccc; cursor:not-allowed; }

/* ===== TOP BAR ===== */
.topbar {
  background: var(--kubota-dark); color: white; display: flex; align-items: center;
  justify-content: space-between; padding: 0 20px; height: 60px; position: sticky;
  top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); gap: 12px;
}
.topbar-logo { display: flex; align-items: center; gap: 12px; min-width:0; }
.kubota-badge { background: var(--kubota-orange); color: white; font-weight: 700; font-size: 12px; padding: 4px 10px; border-radius: 4px; letter-spacing: 1px; flex-shrink:0; }
.topbar-title { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.9); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.topbar-user { display:flex; align-items:center; gap:10px; font-size:12px; color: rgba(255,255,255,0.75); }
.topbar-user .role-pill { background: rgba(232,92,13,0.25); color: var(--accent); font-weight:700; padding: 3px 10px; border-radius: 20px; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
.topbar-actions { display: flex; gap: 8px; align-items: center; flex-shrink:0; }

.btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background: var(--kubota-orange); color: white; }
.btn-primary:hover { background: #c94d08; }
.btn-ghost { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
.btn-ghost:hover { background: rgba(255,255,255,0.2); }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #27ae60; }
.btn-email { background: var(--blue); color: white; }
.btn-email:hover { background: #2980b9; }
.btn-outline { background: transparent; border: 1.5px solid var(--kubota-orange); color: var(--kubota-orange); }
.btn-outline:hover { background: var(--kubota-orange); color: white; }
.btn-danger { background: #FFE8E8; color: var(--danger); border:none; }
.btn-danger:hover { background: var(--danger); color:white; }
.btn-lg { padding: 14px 26px; font-size: 15px; border-radius: 10px; }
.btn:disabled { opacity: .5; cursor:not-allowed; }

/* ===== LAYOUT ===== */
.app-layout { display: flex; min-height: calc(100vh - 60px); }
.sidebar { width: 220px; background: var(--sidebar-bg); flex-shrink: 0; padding: 18px 0; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.68); cursor: pointer; transition: all 0.15s; font-size: 14px; font-weight: 600; border-left: 3px solid transparent; }
.nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
.nav-item.active { color: white; background: rgba(232, 92, 13, 0.15); border-left-color: var(--kubota-orange); }
.nav-icon { font-size: 17px; width: 22px; text-align: center; }
.nav-badge { background: var(--danger); color: white; border-radius: 10px; font-size: 10px; font-weight: 700; padding: 2px 7px; margin-left: auto; }
.main-content { flex: 1; padding: 24px 28px 80px; max-width: calc(100% - 220px); overflow-x: hidden; }
@media (max-width: 860px) {
  .sidebar { display:none; }
  .main-content { max-width: 100%; padding: 16px 14px 90px; }
  .mobile-nav { display:flex !important; }
}
.view { display: none; }
.view.active { display: block; }

/* mobile bottom nav */
.mobile-nav { display:none; position:fixed; bottom:0; left:0; right:0; background: var(--kubota-dark); z-index: 300; box-shadow: 0 -2px 12px rgba(0,0,0,0.3); }
.mobile-nav-inner { display:flex; }
.mobile-nav-item { flex:1; text-align:center; padding: 9px 4px 8px; color: rgba(255,255,255,0.6); font-size: 10.5px; font-weight:600; cursor:pointer; position:relative; }
.mobile-nav-item .nav-icon { display:block; font-size:18px; margin-bottom:2px; }
.mobile-nav-item.active { color: var(--accent); }

.page-header { margin-bottom: 20px; }
.page-header h1 { font-size: 22px; font-weight: 800; color: var(--text-main); }
.page-header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

.card { background: var(--card-bg); border-radius: 14px; border: 1px solid var(--border); padding: 20px; margin-bottom: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.card-title { font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; justify-content: space-between; flex-wrap:wrap; }
.card-title-left { display: flex; align-items: center; gap: 8px; }
.card-title-badge { background: var(--kubota-orange); color: white; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
@media (max-width: 700px) { .form-grid, .form-grid-3, .obs-grid, .ai-form-grid { grid-template-columns: 1fr !important; } }
.form-full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-group label { font-size: 12.5px; font-weight: 700; color: var(--text-main); }
.form-group .hint { font-size: 11px; color: var(--text-muted); font-weight: 400; }
.form-group input, .form-group textarea, .form-group select { border: 1.5px solid var(--border); border-radius: 8px; padding: 11px 13px; font-size: 14px; color: var(--text-main); background: var(--card-bg); transition: border-color 0.15s; outline: none; resize: vertical; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--kubota-orange); box-shadow: 0 0 0 3px rgba(232, 92, 13, 0.08); }
.form-group textarea { min-height: 80px; }
.form-row-check { display:flex; align-items:center; gap:10px; padding: 12px 14px; background:#FAFAF8; border:1px solid var(--border); border-radius:10px; }
.form-row-check input { width:18px; height:18px; accent-color: var(--kubota-orange); cursor:pointer; }
.form-row-check label { font-size:13px; font-weight:600; cursor:pointer; }

/* dealer search */
.dealer-search-wrapper { position: relative; }
.dealer-search-input { width: 100%; padding: 13px 16px; font-size: 15px; border: 2px solid var(--border); border-radius: 10px; outline: none; transition: border-color 0.15s; }
.dealer-search-input:focus { border-color: var(--kubota-orange); }
.dealer-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); max-height: 280px; overflow-y: auto; z-index: 200; display: none; }
.dealer-dropdown.show { display: block; }
.dealer-option { padding: 11px 16px; cursor: pointer; border-bottom: 1px solid #F0EDE8; transition: background 0.1s; }
.dealer-option:last-child { border-bottom: none; }
.dealer-option:hover { background: #FFF3EE; }
.dealer-option-name { font-size: 13.5px; font-weight: 600; color: var(--text-main); }
.dealer-option-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }

.dealer-info-banner { background: linear-gradient(135deg, #1A1A2E 0%, #2D2D44 100%); color: white; border-radius: 14px; padding: 18px 22px; margin-bottom: 18px; display: none; }
.dealer-info-banner.show { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 16px; }
.dealer-info-item label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.5); font-weight: 700; }
.dealer-info-item p { font-size: 13px; font-weight: 600; color: white; margin-top: 4px; word-break:break-word; }
.dealer-info-item .email { font-size: 11px; color: var(--accent); margin-top: 2px; word-break:break-word; }

.dealer-rating-badge { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 8px; font-size: 18px; font-weight: 800; color: white; cursor: pointer; transition: transform 0.1s; flex-shrink:0; }
.dealer-rating-badge:hover { transform: scale(1.08); }
.rating-A { background: var(--success); }
.rating-B { background: var(--warning); }
.rating-C { background: var(--danger); }
.rating-none { background: #ccc; }

.star-rating { display: flex; gap: 5px; margin-top: 6px; }
.star { font-size: 24px; cursor: pointer; color: #DDD; transition: color 0.1s, transform 0.1s; user-select: none; }
.star.filled { color: #F5A623; }
.star:hover { transform: scale(1.15); }

.obs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 8px; }
.obs-item { background: #FAFAF8; border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.obs-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.obs-label { font-size: 12.5px; font-weight: 700; color: var(--text-main); }
.obs-notes { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 7px 9px; font-size: 12px; resize: none; min-height: 48px; background: white; outline: none; margin-top: 8px; }
.obs-notes:focus { border-color: var(--kubota-orange); }

.section-tabs { display: flex; gap: 4px; background: #EEEAE4; padding: 4px; border-radius: 10px; margin-bottom: 18px; width: fit-content; flex-wrap:wrap; }
.section-tab { padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text-muted); transition: all 0.15s; border: none; background: transparent; }
.section-tab.active { background: white; color: var(--kubota-orange); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

.rec-box { background: #FFF8F4; border: 1.5px solid var(--accent); border-radius: 10px; padding: 16px; margin-top:6px; }
.rec-box-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.rec-box-title { font-size: 13px; font-weight: 700; color: var(--kubota-orange); }
.rec-entry { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
.rec-entry input { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 12.5px; outline: none; }
.rec-entry input:focus { border-color: var(--kubota-orange); }
.btn-remove { background: #FFE8E8; color: var(--danger); border: none; border-radius: 6px; padding: 7px 11px; cursor: pointer; font-size: 14px; transition: background 0.15s; flex-shrink:0; }
.btn-remove:hover { background: var(--danger); color: white; }
.btn-add-rec { background: #FFF3EE; color: var(--kubota-orange); border: 1px dashed var(--kubota-orange); border-radius: 6px; padding: 8px 14px; cursor: pointer; font-size: 12.5px; font-weight: 700; width: 100%; margin-top: 4px; }
.btn-add-rec:hover { background: var(--kubota-orange); color: white; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap: 14px; margin-bottom: 20px; }
.stat-card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 18px; text-align: center; }
.stat-number { font-size: 32px; font-weight: 800; color: var(--kubota-orange); line-height: 1; }
.stat-label { font-size: 10.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; }
.stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.visits-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.visits-table th { background: var(--kubota-dark); color: rgba(255,255,255,0.7); padding: 10px 12px; text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
.visits-table th:first-child { border-radius: 8px 0 0 0; }
.visits-table th:last-child { border-radius: 0 8px 0 0; }
.visits-table td { padding: 11px 12px; border-bottom: 1px solid var(--border); color: var(--text-main); vertical-align: middle; }
.visits-table tr:hover td { background: #FAFAF8; }
.visits-table tr:last-child td { border-bottom: none; }
.table-scroll { overflow-x:auto; }

.score-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space:nowrap; }
.score-high { background: #E8F8F0; color: #27AE60; }
.score-mid { background: #FEF9E7; color: #F39C12; }
.score-low { background: #FDECEA; color: #E74C3C; }

.action-item-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #FAFAF8; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; flex-wrap:wrap; }
.action-item-row.done { opacity: 0.55; }
.action-item-row.done .ai-desc { text-decoration: line-through; color: var(--text-muted); }
.ai-check { width: 19px; height: 19px; flex-shrink: 0; cursor: pointer; accent-color: var(--kubota-orange); }
.ai-content { flex: 1; min-width: 180px; }
.ai-desc { font-size: 13.5px; font-weight: 700; color: var(--text-main); }
.ai-meta { font-size: 11.5px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
.ai-meta span { display: flex; align-items: center; gap: 4px; }
.priority-badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; }
.priority-high { background: #FDECEA; color: var(--danger); }
.priority-medium { background: #FEF9E7; color: var(--warning); }
.priority-low { background: #E8F8F0; color: var(--success); }
.status-badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; }
.status-open { background: #EBF5FB; color: var(--blue); }
.status-inprogress { background: #FEF9E7; color: var(--warning); }
.status-done { background: #E8F8F0; color: var(--success); }
.status-overdue { background: #FDECEA; color: var(--danger); }
.visible-badge { background:#EAF7EE; color:#27AE60; }
.hidden-badge { background:#F1F1F1; color:#888; }
.ai-actions { display: flex; gap: 6px; flex-shrink: 0; align-items:center; }

.ai-form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* attachments */
.attach-list { display:flex; flex-direction:column; gap:10px; margin-top: 10px; }
.attach-item { display:flex; align-items:center; gap:12px; padding: 10px 12px; background:#FAFAF8; border:1px solid var(--border); border-radius:10px; }
.attach-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; background: #EEEAE4; }
.attach-body { flex:1; min-width:0; }
.attach-label { font-size:13px; font-weight:600; color:var(--text-main); word-break:break-word; }
.attach-sub { font-size:11px; color:var(--text-muted); margin-top:2px; word-break:break-all; }
.attach-thumb { width:44px; height:44px; border-radius:8px; object-fit:cover; flex-shrink:0; border:1px solid var(--border); }
.attach-add-row { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }

/* wizard */
.wizard-steps { display:flex; gap:6px; margin-bottom: 22px; flex-wrap:wrap; }
.wizard-step { flex:1; min-width:80px; text-align:center; padding: 10px 6px; border-radius: 10px; background:#EEEAE4; color:var(--text-muted); font-size:11.5px; font-weight:700; cursor:pointer; position:relative; }
.wizard-step.active { background: var(--kubota-orange); color:white; }
.wizard-step.complete { background:#FFF3EE; color:var(--kubota-orange); }
.wizard-panel { display:none; }
.wizard-panel.active { display:block; }
.wizard-nav { display:flex; justify-content:space-between; margin-top: 22px; padding-top:18px; border-top:1px solid var(--border); gap:10px; flex-wrap:wrap; }

.empty-state { text-align: center; padding: 50px 16px; color: var(--text-muted); }
.empty-state .icon { font-size: 44px; margin-bottom: 12px; }
.empty-state h3 { font-size: 15px; font-weight: 700; color: var(--text-main); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

.badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-orange { background: #FFF3EE; color: var(--kubota-orange); }
.badge-blue { background: #EBF5FB; color: var(--blue); }
.badge-green { background: #E8F8F0; color: #27AE60; }
.badge-red { background: #FDECEA; color: var(--danger); }

.alert-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-radius: 10px; margin-bottom: 8px; }
.alert-item.alert-warning { background: #FEF9E7; border-left: 4px solid var(--warning); }
.alert-item.alert-danger { background: #FDECEA; border-left: 4px solid var(--danger); }
.alert-item.alert-info { background: #EBF5FB; border-left: 4px solid var(--blue); }
.alert-icon { font-size: 18px; flex-shrink: 0; }
.alert-text { font-size: 12.5px; color: var(--text-main); font-weight: 600; }
.alert-sub { font-size: 11.5px; color: var(--text-muted); margin-top:2px; }

.dealer-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap:14px; }
.dealer-card { background:white; border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition: all .15s; }
.dealer-card:hover { border-color: var(--kubota-orange); box-shadow: 0 4px 16px rgba(232,92,13,0.12); transform: translateY(-2px); }
.dealer-card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.dealer-card-name { font-size:14px; font-weight:700; color:var(--text-main); }
.dealer-card-loc { font-size:12px; color:var(--text-muted); margin-top:3px; }
.dealer-card-meta { font-size:11px; color:var(--text-muted); margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }

.pv-panel { background: linear-gradient(135deg, #1A1A2E, #2D2D44); border-radius: 12px; padding: 18px 20px; margin-bottom: 16px; color: white; }
.pv-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(130px,1fr)); gap: 14px; margin-top: 10px; }
.pv-item { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; }
.pv-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 4px; }
.pv-value { font-size: 13px; font-weight: 700; color: white; }

.action-row { display: flex; gap: 10px; padding: 20px 0 4px; margin-top: 4px; align-items: center; flex-wrap: wrap; }

.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--kubota-dark); color: white; padding: 14px 24px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: 0 8px 30px rgba(0,0,0,0.3); z-index: 2000; transition: transform 0.25s ease; }
.toast.show { transform: translateX(-50%) translateY(0); }

.help-tip { font-size:12px; color:var(--text-muted); background:#FAFAF8; border:1px dashed var(--border); border-radius:8px; padding:10px 12px; margin-bottom:16px; }

@media print {
  .sidebar, .topbar, .mobile-nav, .wizard-nav, .action-row, .quick-notes-fab, .btn { display:none !important; }
  .main-content { max-width:100% !important; padding:0 !important; }
  .wizard-panel { display:block !important; }
}

</style>
</head>

function loginDealerSearch(q) {
  const dd = document.getElementById('dealerLoginDropdown');
  q = (q || '').trim().toLowerCase();
  if (!q) { dd.classList.remove('show'); dd.innerHTML = ''; return; }
  const matches = DEALERS.filter(d =>
    d.name.toLowerCase().includes(q) || d.city.toLowerCase().includes(q) || d.id.includes(q) || (d.state||'').toLowerCase().includes(q)
  ).slice(0, 30);
  if (!matches.length) { dd.innerHTML = '<div class="dealer-option">No matches found</div>'; dd.classList.add('show'); return; }
  dd.innerHTML = matches.map(d => `
    <div class="dealer-option" onclick='selectDealerForLogin(${JSON.stringify(d.id)})'>
      <div class="dealer-option-name">${escapeHtml(d.name)}</div>
      <div class="dealer-option-sub">${escapeHtml(d.city)}, ${escapeHtml(d.state)} · ID ${escapeHtml(d.id)} · RSM: ${escapeHtml(d.rsmName||'—')}</div>
    </div>`).join('');

}

function selectDealerForLogin(id) {
  pendingDealerLoginSelection = DEALERS_BY_ID[id];
  document.getElementById('dealerLoginDropdown').classList.remove('show');
  document.getElementById('dealerLoginSearch').value = pendingDealerLoginSelection.name;
  document.getElementById('dealerLoginSelected').innerHTML = `
    <div class="help-tip">✅ Selected: <strong>${escapeHtml(pendingDealerLoginSelection.name)}</strong> — ${escapeHtml(pendingDealerLoginSelection.city)}, ${escapeHtml(pendingDealerLoginSelection.state)}</div>`;

}

function checkPassword(inputId) {
  const val = (document.getElementById(inputId).value || '').trim().toLowerCase();
  if (val !== LOGIN_PASSWORD) { showToast('⚠️ Incorrect password'); return false; }
  return true;
}

function confirmRSMLogin() {
  const name = document.getElementById('rsmSelect').value;
  if (!name) { showToast('⚠️ Please select your name'); return; }
  if (!checkPassword('rsmPassword')) return;
  const rec = DEALERS.find(d => d.rsmName === name);
  finishLogin({ role: 'rsm', name, email: rec ? rec.rsmEmail : '' });
}
function confirmBDMLogin() {
  const name = (document.getElementById('bdmName').value || '').trim();
  if (!name) { showToast('⚠️ Please enter your name'); return; }
  if (!checkPassword('bdmPassword')) return;
  finishLogin({ role: 'bdm', name });
}
function confirmDealerLogin() {
  if (!pendingDealerLoginSelection) { showToast('⚠️ Please select your dealership'); return; }
  if (!checkPassword('dealerPassword')) return;
  finishLogin({ role: 'dealer', name: pendingDealerLoginSelection.name, dealerId: pendingDealerLoginSelection.id });
}

function finishLogin(user, skipSave) {
  currentUser = user;
  if (!skipSave) saveUser();
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appRoot').classList.remove('hidden');
  buildNavForRole();

function logOut() {
  if (!confirm('Log out? Your saved visits and action items stay on this device — you\'ll just need to sign back in.')) return;
  currentUser = null;
  localStorage.removeItem('crm_user');
  document.getElementById('appRoot').classList.add('hidden');

// ====================================================================
// HELPERS
// ====================================================================
function escapeHtml(s) { return (s == null ? '' : String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/`/g,'&#96;'); }
function isRSM() { return currentUser && currentUser.role === 'rsm'; }
function isDealer() { return currentUser && currentUser.role === 'dealer'; }
function isBDM() { return currentUser && currentUser.role === 'bdm'; }
function canEdit() { return isRSM(); } // only RSM has write access

// ----- Role-based dealer access -----
// An RSM only ever sees, searches, and logs visits for dealers assigned to
// them (matched on the roster's rsmName field). BDMs see every dealer,
// read-only. Dealers only ever see what's shared with their own dealer ID.
function isMyDealer(d) {
  if (!d) return false;
  if (isBDM()) return true;
  if (isRSM()) return d.rsmName === currentUser.name;
  return false;
}
function myDealerList() {
  if (isBDM()) return DEALERS;
  if (isRSM()) return DEALERS.filter(d => d.rsmName === currentUser.name);
  return [];
}
function canSeeVisit(v) { return v.dealer && isMyDealer(v.dealer); }
function canSeeAction(a) { return isMyDealer(DEALERS_BY_ID[a.dealerId]); }
function ownsVisit(v) { return isRSM() && canSeeVisit(v); }
function ownsAction(a) { return isRSM() && canSeeAction(a); }
function visibleVisits() { return visits.filter(canSeeVisit); }
function visibleActionItems() { return actionItems.filter(canSeeAction); }

// ----- Dealer health indicator: green / amber / red -----
function dealerHealth(d) {
  const dVisits = visits.filter(v => v.dealer && v.dealer.id === d.id).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const last = dVisits[0];
  const hasOverdue = actionItems.some(a => a.dealerId === d.id && isOverdue(a));
  if (hasOverdue) return 'red';
  if (!last || !last.date) return 'amber'; // not visited yet in the system
  const daysSince = Math.floor((Date.now() - new Date(last.date + 'T00:00:00')) / 86400000);
  if (daysSince > 90) return 'red';
  if (daysSince > 45) return 'amber';
  return 'green';
}
function healthLabel(h) { return h === 'red' ? 'Immediate Attention' : h === 'amber' ? 'Needs Attention' : 'Healthy'; }
function healthDot(h, size) {
  size = size || 10;
  const color = h === 'red' ? 'var(--danger)' : h === 'amber' ? 'var(--warning)' : 'var(--success)';
  return `<span title="${healthLabel(h)}" style="display:inline-block;width:${size}px;height:${size}px;border-radius:50%;background:${color};flex-shrink:0;"></span>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function isOverdue(item) {
  if (!item.dueDate || item.status === 'done') return false;
  return new Date(item.dueDate) < new Date(new Date().toDateString());
}
function scoreCell(val) {
  if (!val) return '<span style="color:#ccc;font-size:12px">—</span>';
  const f = parseFloat(val);
  return `<span class="score-badge ${f>=4?'score-high':f>=3?'score-mid':'score-low'}">⭐ ${val}</span>`;
}
function websiteLink(raw) {
  const val = (raw || '').trim();
  if (!val || val === '—') return '—';
  // Some records have a stray name/phone instead of a real URL — only linkify things that look like a domain.
  if (/\s/.test(val) || !/\.[a-z]{2,}/i.test(val)) return escapeHtml(val);
  const href = /^https?:\/\//i.test(val) ? val : 'https://' + val;
  return `<a href="${escapeAttr(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(val)}</a>`;
}

function buildNavForRole() {

  const html = items.map((it, i) => `
    <div class="nav-item" data-view="${it.id}" onclick="${navClick(it)}">
      <span class="nav-icon">${it.icon}</span> ${it.label}
      ${it.badge ? `<span class="nav-badge" id="openActionsCount">0</span>` : ''}
    </div>`).join('');

  document.getElementById('mobileNav').innerHTML = items.map(it => `
    <div class="mobile-nav-item" data-view="${it.id}" onclick="${navClick(it)}">
      <span class="nav-icon">${it.icon}</span>${it.label}
    </div>`).join('');

  document.getElementById('topbarTitle').textContent =
    currentUser.role === 'dealer' ? 'Dealer Portal' : 'Dealer Visit CRM';
}

function navToNewVisit(el) {
  resetWizard();
  switchView('wizardView', el);
}

function goHome() {
  const first = NAV_CONFIG[currentUser.role][0];
  const navEl = document.querySelector(`.nav-item[data-view="${first.id}"]`);
  switchView(first.id, navEl);
}

function switchView(viewId, clickedEl) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const target = document.getElementById(viewId);
  if (target) target.classList.add('active');
  document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll(`[data-view="${viewId}"]`).forEach(n => n.classList.add('active'));
  window.scrollTo(0,0);

  if (viewId === 'dashView') renderRsmDashboard();
  if (viewId === 'dealersView') renderDealersBrowse();
  if (viewId === 'wizardView') { renderWizardStep(); }
  if (viewId === 'actionsView') renderActions();
  if (viewId === 'logView') renderVisitLog();
  if (viewId === 'dealerHomeView') renderDealerHome();
  if (viewId === 'dealerVisitsView') renderDealerVisits();
  if (viewId === 'dealerActionsView') renderDealerActions();
  updateOpenActionsCount();
}

function renderDealerGrid() {
  const q = (document.getElementById('dealersBrowseSearch').value || '').trim().toLowerCase();
  const rsmFilter = isBDM() ? document.getElementById('dealersBrowseRsm').value : '';
  let list = myDealerList();
  if (rsmFilter) list = list.filter(d => d.rsmName === rsmFilter);
  if (q) list = list.filter(d => d.name.toLowerCase().includes(q) || d.city.toLowerCase().includes(q) || (d.state||'').toLowerCase().includes(q) || d.id.includes(q));

  const grid = document.getElementById('dealerGrid');
  if (!q && !rsmFilter && isBDM()) {
    grid.innerHTML = `<div class="help-tip" style="margin-top:14px">Type a name/city above or pick an RSM to browse. There are ${DEALERS.length} dealer locations in the system.</div>`;
    return;
  }
  const shown = (isBDM() ? list.slice(0, 90) : list);
  if (!shown.length) { grid.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>No dealers found</h3></div>'; return; }
  const myVisits = visibleVisits();
  const myActions = visibleActionItems();
  grid.innerHTML = `<div class="dealer-grid" style="margin-top:16px">` + shown.map(d => {
    const dv = myVisits.filter(v => v.dealer && v.dealer.id === d.id).length;
    const openA = myActions.filter(a => a.dealerId === d.id && a.status !== 'done').length;
    const health = dealerHealth(d);
    return `
    <div class="dealer-card" onclick="openDealerProfile('${d.id}')">
      <div class="dealer-card-top">
        <div>
          <div class="dealer-card-name">${healthDot(health)} ${escapeHtml(d.name)}</div>
          <div class="dealer-card-loc">${escapeHtml(d.city)}, ${escapeHtml(d.state)}</div>
        </div>
      </div>
      <div class="dealer-card-meta">
        <span>📁 ${dv} visit${dv===1?'':'s'}</span>
        ${openA ? `<span style="color:var(--danger)">✅ ${openA} open</span>` : ''}
        ${isBDM() ? `<span>👤 ${escapeHtml(d.rsmName||'—')}</span>` : ''}
      </div>
    </div>`;
  }).join('') + `</div>` + (isBDM() && list.length > 90 ? `<div class="help-tip" style="margin-top:12px">Showing first 90 of ${list.length} matches — refine your search to narrow it down.</div>` : '');
}

function openDealerProfile(id) {
  const d = DEALERS_BY_ID[id];
  if (isRSM() && !isMyDealer(d)) { showToast('⚠️ That dealer isn\u2019t assigned to you'); return; }

  switchView('dealerProfileView', null);
  renderDealerProfile();
}

      <div class="dealer-info-item"><label>Dealer Contact</label><p>&nbsp;</p><div class="email">${escapeHtml(d.ownerEmail1||'—')}</div></div>

// Builds the wizard DOM from scratch. Only call this when entering the
// wizard fresh (new visit / loading a saved visit) — NOT on step navigation,
// or anything typed into earlier steps would be lost.
function renderWizardStep() {
  document.getElementById('wizardView').innerHTML = wizardHtml();
  buildObsBlocks();
  document.getElementById('recList').innerHTML = '';
  recommendations.forEach((v, idx) => addRecRow(idx, v));
  if (!recommendations.length) addRec();
  renderAttachEditor();
  renderWizardActionsPreview();
  if (selectedDealer) applyDealerToForm();
  if (!document.getElementById('visitDate').value) document.getElementById('visitDate').value = new Date().toISOString().split('T')[0];
  if (!document.getElementById('newAiDue').value) document.getElementById('newAiDue').value = new Date(Date.now()+7*24*60*60*1000).toISOString().split('T')[0];
  updateRatingUI();
  setWizardStepDisplay();
}

// Only toggles which step is visible — never rebuilds the form, so all
// previously entered values (in any step) are preserved.
function setWizardStepDisplay() {
  document.querySelectorAll('.wizard-step').forEach((el, i) => {
    el.classList.toggle('active', i+1 === wizardStep);
    el.classList.toggle('complete', i+1 < wizardStep);
  });
  document.querySelectorAll('.wizard-panel').forEach((el, i) => {
    el.classList.toggle('active', i+1 === wizardStep);
  });
  const backBtn = document.getElementById('wizBackBtn');
  const contBtn = document.getElementById('wizContinueBtn');
  if (backBtn) backBtn.disabled = wizardStep === 1;
  if (contBtn) contBtn.classList.toggle('hidden', wizardStep === 4);
  window.scrollTo(0,0);
}

function goToWizardStep(n) {
  if (n > 1 && !selectedDealer) { showToast('⚠️ Please select a dealer first (Step 1)'); return; }
  wizardStep = n;
  setWizardStepDisplay();
}
function wizardNext() {
  if (wizardStep === 1 && !selectedDealer) { showToast('⚠️ Please select a dealer before continuing'); return; }
  wizardStep = Math.min(4, wizardStep + 1);
  setWizardStepDisplay();
  if (wizardStep === 4) renderWizardActionsPreview();
}
function wizardBack() { wizardStep = Math.max(1, wizardStep - 1); setWizardStepDisplay(); }

function buildObsBlocks() {
  const build = (arr, prefix) => arr.map((item,i) => `
    <div class="obs-item">
      <div class="obs-item-header"><span class="obs-label">${item}</span></div>
      <div class="star-rating" id="${prefix}_star${i}" data-value="0">
        ${[1,2,3,4,5].map(n => `<span class="star" data-val="${n}" onclick="setRating('${prefix}_star${i}', ${n})">★</span>`).join('')}
      </div>
      <textarea class="obs-notes" id="${prefix}_note${i}" placeholder="Notes..."></textarea>
    </div>`).join('');
  document.getElementById('salesObsGrid').innerHTML = build(SALES_OBS, 'sales');
  document.getElementById('serviceObsGrid').innerHTML = build(SERVICE_OBS, 'service');
  document.getElementById('partsObsGrid').innerHTML = build(PARTS_OBS, 'parts');
}

function switchObsTab(tab, btn) {
  document.querySelectorAll('.obs-section').forEach(s => s.style.display = 'none');
  document.querySelectorAll('#wizStep2 .section-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(tab + 'Obs').style.display = 'block';
  btn.classList.add('active');
}

function setRating(id, val) {
  const el = document.getElementById(id);
  el.dataset.value = val;
  el.querySelectorAll('.star').forEach(s => s.classList.toggle('filled', parseInt(s.dataset.val) <= val));
}
function getRating(id) { const el = document.getElementById(id); return el ? parseInt(el.dataset.value || 0) : 0; }

function addRec() { recommendations.push(''); addRecRow(recommendations.length - 1, ''); }
function addRecRow(idx, val) {
  const list = document.getElementById('recList');
  const div = document.createElement('div');
  div.className = 'rec-entry'; div.id = `rec_${idx}`;
  div.innerHTML = `<input type="text" value="${escapeAttr(val)}" placeholder="Recommendation from dealer..." oninput="recommendations[${idx}]=this.value"><button class="btn-remove" onclick="removeRec(${idx})">✕</button>`;
  list.appendChild(div);
}
function removeRec(idx) { const el = document.getElementById(`rec_${idx}`); if (el) el.remove(); recommendations[idx] = null; }

// ----- Dealer search (wizard) -----
function filterDealers(q) {
  const dd = document.getElementById('dealerDropdown');
  q = (q||'').trim().toLowerCase();
  if (!q) { dd.classList.remove('show'); return; }
  const matches = myDealerList().filter(d => d.name.toLowerCase().includes(q) || d.city.toLowerCase().includes(q) || d.id.includes(q)).slice(0, 25);
  if (!matches.length) { dd.innerHTML = `<div class="dealer-option">No matches in your assigned dealers</div>`; dd.classList.add('show'); return; }
  dd.innerHTML = matches.map(d => `
    <div class="dealer-option" onclick='selectDealer(${JSON.stringify(d).replace(/'/g, "&#39;")})'>
      <div class="dealer-option-name">${escapeHtml(d.name)}</div>
      <div class="dealer-option-sub">${escapeHtml(d.city)}, ${escapeHtml(d.state)} · ID ${escapeHtml(d.id)}</div>
    </div>`).join('');
  dd.classList.add('show');
}

function selectDealer(d) {
  if (isRSM() && !isMyDealer(d)) { showToast('⚠️ That dealer isn\u2019t assigned to you'); return; }
  selectedDealer = d;
  document.getElementById('dealerDropdown').classList.remove('show');
  applyDealerToForm();
}

function applyDealerToForm() {
  const d = selectedDealer;
  document.getElementById('dealerSearch').value = d.name;
  document.getElementById('bi-id').textContent = d.id;
  document.getElementById('bi-phone').textContent = d.phone || '—';
  document.getElementById('bi-loc').textContent = `${d.city}, ${d.state}`;
  document.getElementById('bi-dstm').textContent = d.dstmName || '—';
  document.getElementById('bi-dstm-email').textContent = d.dstmEmail || '—';
  document.getElementById('bi-rsm').textContent = d.rsmName || '—';
  document.getElementById('bi-rsm-code').textContent = d.rsmEmail || '—';
  document.getElementById('bi-website').innerHTML = websiteLink(d.dealerWebsite);
  document.getElementById('dealerBanner').classList.add('show');

  const dealerVisits = visibleVisits().filter(v => v.dealer && v.dealer.id === d.id).sort((a,b) => (b.date||'').localeCompare(a.date||''));
  const openActs = visibleActionItems().filter(a => a.dealerId === d.id && a.status !== 'done').length;
  document.getElementById('pv-dealerName').textContent = d.name;
  document.getElementById('pv-lastVisit').textContent = dealerVisits[0] ? dealerVisits[0].date : 'No prior visits';
  document.getElementById('pv-openActions').textContent = `${openActs} open`;
  document.getElementById('pv-rating').textContent = dealerVisits[0] && dealerVisits[0].dealerRating ? dealerVisits[0].dealerRating : 'Not rated';
  document.getElementById('previsitPanel').classList.remove('hidden');
}

function setDealerRating(r) {
  currentDealerRating = r;
  updateRatingUI();
}
function updateRatingUI() {
  ['A','B','C'].forEach(r => {
    const btn = document.getElementById('rating'+r);
    if (btn) btn.style.outline = (currentDealerRating === r) ? '3px solid var(--kubota-dark)' : 'none';
  });
  const labels = { A: 'A — High Performer', B: 'B — Average Performer', C: 'C — Needs Improvement' };
  const lbl = document.getElementById('ratingLabel');
  if (lbl) lbl.textContent = currentDealerRating ? labels[currentDealerRating] : 'Click to assign A / B / C rating';
}

function toggleAttachForm(type) {
  const area = document.getElementById('attachFormArea');
  if (type === 'link') {
    area.innerHTML = `
      <div class="card" style="background:#FAFAF8;margin-top:12px;margin-bottom:0;padding:16px;">
        <div class="form-grid">
          <div class="form-group"><label>Link label</label><input type="text" id="attLinkLabel" placeholder="e.g. Dealer website, photo album..."></div>
          <div class="form-group"><label>URL</label><input type="text" id="attLinkUrl" placeholder="https://..."></div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="commitLinkAttachment()">Add Link</button>
        <button class="btn btn-ghost btn-sm" style="background:#eee;color:#666" onclick="document.getElementById('attachFormArea').innerHTML=''">Cancel</button>
      </div>`;
  } else if (type === 'image') {
    area.innerHTML = `
      <div class="card" style="background:#FAFAF8;margin-top:12px;margin-bottom:0;padding:16px;">
        <div class="form-group"><label>Photo label (optional)</label><input type="text" id="attImgLabel" placeholder="e.g. Showroom floor, new signage..."></div>
        <div class="form-group"><label>Choose photo</label><input type="file" id="attImgFile" accept="image/*"></div>
        <button class="btn btn-primary btn-sm" onclick="commitImageAttachment()">Add Photo</button>
        <button class="btn btn-ghost btn-sm" style="background:#eee;color:#666" onclick="document.getElementById('attachFormArea').innerHTML=''">Cancel</button>
      </div>`;
  } else if (type === 'note') {
    area.innerHTML = `
      <div class="card" style="background:#FAFAF8;margin-top:12px;margin-bottom:0;padding:16px;">
        <div class="form-group"><label>Note</label><textarea id="attNoteText" placeholder="Quick note to attach to this visit..."></textarea></div>
        <button class="btn btn-primary btn-sm" onclick="commitNoteAttachment()">Add Note</button>
        <button class="btn btn-ghost btn-sm" style="background:#eee;color:#666" onclick="document.getElementById('attachFormArea').innerHTML=''">Cancel</button>
      </div>`;
  }
}

function commitLinkAttachment() {
  const label = (document.getElementById('attLinkLabel').value || '').trim();
  let url = (document.getElementById('attLinkUrl').value || '').trim();
  if (!url) { showToast('⚠️ Please enter a URL'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  wizardAttachments.push({ id: Date.now(), type: 'link', label: label || url, url, addedAt: new Date().toISOString() });
  document.getElementById('attachFormArea').innerHTML = '';
  renderAttachEditor();
  showToast('🔗 Link added');
}

function commitImageAttachment() {
  const label = (document.getElementById('attImgLabel').value || '').trim();
  const fileInput = document.getElementById('attImgFile');
  const file = fileInput.files[0];
  if (!file) { showToast('⚠️ Please choose a photo'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    wizardAttachments.push({ id: Date.now(), type: 'image', label: label || file.name, dataUrl: e.target.result, addedAt: new Date().toISOString() });
    document.getElementById('attachFormArea').innerHTML = '';
    renderAttachEditor();
    showToast('🖼️ Photo added');
  };
  reader.readAsDataURL(file);
}

function commitNoteAttachment() {
  const text = (document.getElementById('attNoteText').value || '').trim();
  if (!text) { showToast('⚠️ Please write a note'); return; }
  wizardAttachments.push({ id: Date.now(), type: 'note', label: text, addedAt: new Date().toISOString() });
  document.getElementById('attachFormArea').innerHTML = '';
  renderAttachEditor();
  showToast('📝 Note added');
}

function removeAttachment(id) {
  wizardAttachments = wizardAttachments.filter(a => a.id !== id);
  renderAttachEditor();
}

function renderAttachEditor() {
  const list = document.getElementById('wizAttachList');
  if (!list) return;
  if (!wizardAttachments.length) { list.innerHTML = '<div class="help-tip">No attachments added yet.</div>'; return; }
  list.innerHTML = wizardAttachments.map(a => renderAttachmentItem(a, true)).join('');
}

function renderAttachmentItem(a, editable) {
  const icon = a.type === 'link' ? '🔗' : a.type === 'image' ? '🖼️' : '📝';
  const dateStr = a.addedAt ? new Date(a.addedAt).toLocaleDateString() : '';
  const sub = a.type === 'link' ? a.url : (a.visitDate ? `From visit on ${a.visitDate}` : dateStr);
  return `
    <div class="attach-item">
      ${a.type === 'image' ? `<img src="${a.dataUrl}" class="attach-thumb" onclick="viewImageLightbox('${a.dataUrl.replace(/'/g,"\\'")}')">` : `<div class="attach-icon">${icon}</div>`}
      <div class="attach-body">
        <div class="attach-label">${a.type === 'link' ? `<a href="${escapeAttr(a.url)}" target="_blank" rel="noopener">${escapeHtml(a.label)}</a>` : escapeHtml(a.label)}</div>
        <div class="attach-sub">${escapeHtml(sub||'')}</div>
      </div>
      ${editable ? `<button class="btn-remove" onclick="removeAttachment(${a.id})">✕</button>` : ''}
    </div>`;
}

function viewImageLightbox(src) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:3000;display:flex;align-items:center;justify-content:center;padding:24px;cursor:zoom-out;';
  overlay.innerHTML = `<img src="${src}" style="max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.5)">`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}

function addActionItemFromForm() {
  if (!selectedDealer) { showToast('⚠️ Please select a dealer first (Step 1)'); return; }
  const desc = (document.getElementById('newAiDesc').value || '').trim();
  if (!desc) { showToast('⚠️ Please enter a description'); return; }
  const item = {
    id: Date.now(),
    description: desc,
    dealerName: selectedDealer ? selectedDealer.name : '—',
    dealerId: selectedDealer ? selectedDealer.id : null,
    assignee: document.getElementById('newAiAssignee').value,
    dueDate: document.getElementById('newAiDue').value,
    priority: document.getElementById('newAiPriority').value,
    visibleToDealer: document.getElementById('newAiVisible').checked,
    status: 'open',
    createdAt: new Date().toISOString(),
    createdBy: currentUser.name
  };
  actionItems.unshift(item);
  saveActions();
  document.getElementById('newAiDesc').value = '';
  document.getElementById('newAiVisible').checked = false;
  showToast('✅ Action item added');
  renderWizardActionsPreview();
  updateOpenActionsCount();
}

function renderWizardActionsPreview() {
  const el = document.getElementById('wizardActionsPreview');
  if (!el) return;
  const items = selectedDealer ? visibleActionItems().filter(a => a.dealerId === selectedDealer.id) : [];
  el.innerHTML = items.length ? items.slice(0,5).map(renderActionItemRow).join('') : '';
}

function addStandaloneAction() {
  const desc = (document.getElementById('standaloneAiDesc').value || '').trim();
  if (!desc) { showToast('⚠️ Enter a description'); return; }
  const dealerVal = document.getElementById('standaloneAiDealer').value;
  const dealerMatch = myDealerList().find(d => d.name === dealerVal);
  if (!dealerMatch) { showToast('⚠️ Please pick one of your assigned dealers from the list'); return; }
  const item = {
    id: Date.now(),
    description: desc,
    dealerName: dealerMatch.name,
    dealerId: dealerMatch.id,
    assignee: document.getElementById('standaloneAiAssignee').value,
    dueDate: document.getElementById('standaloneAiDue').value,
    priority: document.getElementById('standaloneAiPriority').value,
    status: document.getElementById('standaloneAiStatus').value,
    visibleToDealer: document.getElementById('standaloneAiVisible').checked,
    createdAt: new Date().toISOString(),
    createdBy: currentUser.name
  };
  actionItems.unshift(item);
  saveActions();
  document.getElementById('standaloneAiDesc').value = '';
  document.getElementById('standaloneAiDealer').value = '';
  showToast('✅ Action item added');
  renderActionsList();
  updateOpenActionsCount();
}

function updateActionStatus(id, newStatus) {
  const item = actionItems.find(a => a.id === id);
  if (!item || !ownsAction(item)) return;
  item.status = newStatus; saveActions(); renderActionsList(); updateOpenActionsCount();
}

function deleteAction(id) {
  const item = actionItems.find(a => a.id === id);
  if (!item || !ownsAction(item)) return;
  if (!confirm('Delete this action item?')) return;
  actionItems = actionItems.filter(a => a.id !== id);
  saveActions();
  renderActionsList();
  updateOpenActionsCount();
}

function filterActions(filter, btn) {
  activeActionFilter = filter;
  document.querySelectorAll('#actionsView .section-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderActionsList();
}

function renderActionItemRow(a) {
  const overdue = isOverdue(a);
  const statusClass = overdue ? 'status-overdue' : `status-${a.status}`;
  const statusLabel = overdue ? 'Overdue' : (a.status === 'inprogress' ? 'In Progress' : a.status.charAt(0).toUpperCase()+a.status.slice(1));
  const editable = isDealer() ? false : ownsAction(a);
  const sharedBadges = isDealer() ? '' : `
          ${a.visibleToDealer ? '<span class="badge visible-badge">Shared with dealer</span>' : '<span class="badge hidden-badge">Internal only</span>'}
          ${(!isDealer() && !ownsAction(a)) ? `<span class="badge badge-orange">by ${escapeHtml(a.createdBy||'—')}</span>` : ''}`;
  return `
    <div class="action-item-row ${a.status==='done'?'done':''}">
      <input type="checkbox" class="ai-check" ${a.status==='done'?'checked':''} ${editable?`onchange="updateActionStatus(${a.id}, this.checked?'done':'open')"`:'disabled'}>
      <div class="ai-content">
        <div class="ai-desc">${escapeHtml(a.description)}</div>
        <div class="ai-meta">
          <span>🏢 ${escapeHtml(a.dealerName||'—')}</span>
          <span>👤 ${escapeHtml(a.assignee)}</span>
          ${a.dueDate ? `<span style="color:${overdue?'var(--danger)':'inherit'}">📅 ${a.dueDate}</span>` : ''}
          <span class="priority-badge priority-${a.priority}">${a.priority.charAt(0).toUpperCase()+a.priority.slice(1)}</span>
          <span class="status-badge ${statusClass}">${statusLabel}</span>
          ${sharedBadges}
        </div>
      </div>
      ${editable ? `<div class="ai-actions">
        ${a.status!=='done' ? `<select onchange="updateActionStatus(${a.id}, this.value)" style="border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;cursor:pointer;">
          <option value="open" ${a.status==='open'?'selected':''}>Open</option>
          <option value="inprogress" ${a.status==='inprogress'?'selected':''}>In Progress</option>
          <option value="done">Done</option>
        </select>` : ''}
        <button onclick="deleteAction(${a.id})" class="btn-remove" style="font-size:12px;padding:5px 9px;">✕</button>
      </div>` : ''}
    </div>`;
}

function renderActions() {
  document.getElementById('actionsView').innerHTML = `
    <div class="page-header"><h1>✅ Action Items</h1><p>${isRSM() ? 'Action items for your assigned dealers.' : 'Track commitments, follow-ups, and assigned tasks.'}</p></div>
    ${canEdit() ? `
    <div class="card">
      <div class="card-title"><div class="card-title-left">+ New Action Item</div></div>
      <div class="ai-form-grid" style="margin-bottom:12px;">
        <div class="form-group" style="grid-column:1/-1"><label>Description</label><input type="text" id="standaloneAiDesc" placeholder="What needs to be done?"></div>
        <div class="form-group"><label>Dealer</label>
          <input type="text" id="standaloneAiDealer" placeholder="Start typing one of your dealers..." list="allDealerNames">
          <datalist id="allDealerNames">${myDealerList().map(d => `<option value="${escapeAttr(d.name)}">`).join('')}</datalist>
        </div>
        <div class="form-group"><label>Assigned To</label><select id="standaloneAiAssignee"><option value="RSM">RSM</option><option value="Dealer">Dealer</option><option value="DSTM">DSTM</option><option value="Both">RSM + Dealer</option></select></div>
        <div class="form-group"><label>Due Date</label><input type="date" id="standaloneAiDue"></div>
        <div class="form-group"><label>Priority</label><select id="standaloneAiPriority"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>
        <div class="form-group"><label>Status</label><select id="standaloneAiStatus"><option value="open">Open</option><option value="inprogress">In Progress</option><option value="done">Done</option></select></div>
      </div>
      <div class="form-row-check" style="margin-bottom:12px"><input type="checkbox" id="standaloneAiVisible"><label for="standaloneAiVisible">Share with the dealer</label></div>
      <button class="btn btn-primary" onclick="addStandaloneAction()">+ Add Action Item</button>
    </div>` : ''}
    <div class="card" style="padding:16px 20px;">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <span style="font-size:12px;font-weight:700;color:var(--text-muted);">Filter:</span>
        <button class="section-tab active" onclick="filterActions('all', this)">All</button>
        <button class="section-tab" onclick="filterActions('open', this)">Open</button>
        <button class="section-tab" onclick="filterActions('inprogress', this)">In Progress</button>
        <button class="section-tab" onclick="filterActions('overdue', this)" style="color:var(--danger);">Overdue</button>
        <button class="section-tab" onclick="filterActions('done', this)">Done</button>
        <input type="text" id="actionSearch" placeholder="Search by dealer or description..." oninput="renderActionsList()" style="margin-left:auto;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;outline:none;width:220px;">
      </div>
    </div>
    <div class="card"><div id="actionItemsList"></div></div>
  `;
  renderActionsList();
}

function renderActionsList() {
  const searchVal = (document.getElementById('actionSearch') && document.getElementById('actionSearch').value || '').toLowerCase();
  let filtered = visibleActionItems().filter(a => {
    if (searchVal && !a.description.toLowerCase().includes(searchVal) && !(a.dealerName||'').toLowerCase().includes(searchVal)) return false;
    if (activeActionFilter === 'open') return a.status === 'open';
    if (activeActionFilter === 'inprogress') return a.status === 'inprogress';
    if (activeActionFilter === 'done') return a.status === 'done';
    if (activeActionFilter === 'overdue') return isOverdue(a);
    return true;
  });
  const container = document.getElementById('actionItemsList');
  if (!container) return;
  container.innerHTML = filtered.length ? filtered.map(renderActionItemRow).join('') : '<div class="empty-state"><div class="icon">✅</div><h3>No action items here</h3><p>Try a different filter or add a new one above</p></div>';
}

function updateOpenActionsCount() {
  const open = visibleActionItems().filter(a => a.status !== 'done').length;
  const badge = document.getElementById('openActionsCount');
  if (badge) { badge.textContent = open; badge.style.display = open > 0 ? '' : 'none'; }
}


// ====================================================================
// SAVE / COLLECT VISIT
// ====================================================================

function collectFormData() {
  const preNotes = (document.getElementById('preVisitNotes')||{}).value || '';
  const durNotes = (document.getElementById('duringVisitNotes')||{}).value || '';
  const salesObs = SALES_OBS.map((item,i) => ({ item, rating: getRating(`sales_star${i}`), notes: (document.getElementById(`sales_note${i}`)||{}).value || '' }));
  const serviceObs = SERVICE_OBS.map((item,i) => ({ item, rating: getRating(`service_star${i}`), notes: (document.getElementById(`service_note${i}`)||{}).value || '' }));
  const partsObs = PARTS_OBS.map((item,i) => ({ item, rating: getRating(`parts_star${i}`), notes: (document.getElementById(`parts_note${i}`)||{}).value || '' }));
  const avgRating = arr => { const rated = arr.filter(a => a.rating > 0); return rated.length ? (rated.reduce((s,a) => s+a.rating,0)/rated.length).toFixed(1) : null; };
  return {
    id: editingVisitId || Date.now(),
    date: document.getElementById('visitDate').value,
    dealer: selectedDealer,
    dealerName: selectedDealer ? selectedDealer.name : (document.getElementById('dealerSearch').value || ''),
    purpose: document.getElementById('visitPurpose').value,
    kubotaContacts: document.getElementById('kubotaContacts').value,
    dealerContacts: document.getElementById('dealerContacts').value,
    dealerRating: currentDealerRating,
    visibleToDealer: document.getElementById('visibleToDealerToggle').checked,
    nextVisitDate: document.getElementById('nextVisitDate').value,
    nextVisitReason: document.getElementById('nextVisitReason').value,
    preVisit: preNotes,
    during: durNotes,
    competitorActivity: document.getElementById('competitorActivity').value,
    trainingNeeds: document.getElementById('trainingNeeds').value,
    recommendations: recommendations.filter(r => r !== null && r !== ''),
    observations: { sales: salesObs, service: serviceObs, parts: partsObs },
    scores: { sales: avgRating(salesObs), service: avgRating(serviceObs), parts: avgRating(partsObs) },
    keyOpps: document.getElementById('keyOpps').value,
    followUps: document.getElementById('followUps').value,
    immediateActions: document.getElementById('immediateActions').value,
    attachments: wizardAttachments,
    loggedBy: currentUser.name,
    updatedAt: new Date().toISOString()
  };
}

function saveVisit() {
  if (!selectedDealer) { showToast('⚠️ Please select a dealer first'); goToWizardStep(1); return; }
  if (!document.getElementById('nextVisitDate').value) {
    showToast('⚠️ Please set a next visit date before saving — nothing should fall through the cracks');
    goToWizardStep(4);
    document.getElementById('nextVisitDate').focus();
    return;
  }
  const data = collectFormData();
  const existingIdx = visits.findIndex(v => v.id === data.id);
  if (existingIdx >= 0) visits[existingIdx] = data; else visits.unshift(data);
  saveVisits();
  showToast('✅ Visit saved!');
  editingVisitId = data.id;
  updateOpenActionsCount();

  const dealerActionCount = actionItems.filter(a => a.dealerId === data.dealer.id && ownsAction(a)).length;
  const banner = document.getElementById('saveConfirmBanner');
  if (banner) {
    banner.innerHTML = `
      <div class="alert-item alert-info" style="margin-bottom:18px">
        <div class="alert-icon">✅</div>
        <div style="flex:1">
          <div class="alert-text">Visit saved for ${escapeHtml(data.dealerName)} — next visit planned for ${data.nextVisitDate}. ${data.attachments.length} attachment${data.attachments.length===1?'':'s'} and ${dealerActionCount} action item${dealerActionCount===1?'':'s'} on file.</div>
          <div class="alert-sub">You can keep editing and save again, or jump straight to the dealer's page to see everything together.</div>
        </div>
      </div>
      <div class="action-row" style="border:none;padding:0;margin:0 0 4px">
        <button class="btn btn-outline btn-sm" onclick="openDealerProfile('${data.dealer.id}')">🏢 View Dealer Profile</button>
      </div>`;
  }
}

function loadVisitIntoWizard(id) {
  const v = visits.find(v => v.id === id);
  if (!v) return;
  if (!ownsVisit(v)) { showToast('👀 View only — this dealer isn\u2019t assigned to you'); }
  resetWizard();
  editingVisitId = ownsVisit(v) ? v.id : null;
  wizardStep = 1;
  switchView('wizardView', document.querySelector('[data-view="wizardView"]'));
  if (v.dealer) selectedDealer = v.dealer;
  recommendations = (v.recommendations && v.recommendations.length) ? [...v.recommendations] : [''];
  wizardAttachments = v.attachments ? [...v.attachments] : [];
  currentDealerRating = v.dealerRating || null;
  renderWizardStep();

  document.getElementById('visitDate').value = v.date || '';
  document.getElementById('visitPurpose').value = v.purpose || '';
  document.getElementById('kubotaContacts').value = v.kubotaContacts || '';
  document.getElementById('dealerContacts').value = v.dealerContacts || '';
  document.getElementById('visibleToDealerToggle').checked = !!v.visibleToDealer;
  document.getElementById('nextVisitDate').value = v.nextVisitDate || '';
  document.getElementById('nextVisitReason').value = v.nextVisitReason || '';
  document.getElementById('preVisitNotes').value = (typeof v.preVisit === 'string') ? v.preVisit : ((v.preVisit||[]).map(q=>q.answer).filter(Boolean).join('\n\n'));
  document.getElementById('duringVisitNotes').value = (typeof v.during === 'string') ? v.during : ((v.during||[]).map(q=>q.answer).filter(Boolean).join('\n\n'));
  document.getElementById('competitorActivity').value = v.competitorActivity || '';
  document.getElementById('trainingNeeds').value = v.trainingNeeds || '';
  ['sales','service','parts'].forEach(dept => {
    (v.observations && v.observations[dept] || []).forEach((obs,i) => {
      setRating(`${dept}_star${i}`, obs.rating);
      const el = document.getElementById(`${dept}_note${i}`); if (el) el.value = obs.notes;
    });
  });
  document.getElementById('keyOpps').value = v.keyOpps || '';
  document.getElementById('followUps').value = v.followUps || '';
  document.getElementById('immediateActions').value = v.immediateActions || '';
  updateRatingUI();
  showToast('📋 Visit loaded for editing');
}

function deleteVisit(id) {
  const v = visits.find(v => v.id === id);
  if (!v || !ownsVisit(v)) { showToast('⚠️ You can only delete visits for your assigned dealers'); return; }
  if (!confirm('Delete this visit record? This cannot be undone.')) return;
  visits = visits.filter(v => v.id !== id);
  saveVisits();
  if (dealerProfileId) renderDealerProfile(); else renderVisitLog();
  showToast('🗑️ Visit deleted');
}

function clearWizard() {
  if (!confirm('Discard this visit and start over?')) return;
  resetWizard();
  renderWizardStep();
  showToast('🗑️ Cleared');
}

function renderRsmDashboard() {
  const myVisits = visibleVisits();
  const myActions = visibleActionItems();
  const myDealers = myDealerList();
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const total = myVisits.length;
  const thisMonthVisits = myVisits.filter(v => v.date && v.date.startsWith(thisMonth)).length;
  const openAI = myActions.filter(a => a.status !== 'done').length;
  const overdueAI = myActions.filter(a => isOverdue(a)).length;

  // "Upcoming Visits" = each dealer's next planned visit (from their latest logged visit), due within 30 days or overdue
  const todayStr = new Date().toISOString().split('T')[0];
  const upcoming = [];
  myDealers.forEach(d => {
    const dVisits = myVisits.filter(v => v.dealer && v.dealer.id === d.id).sort((a,b) => (b.date||'').localeCompare(a.date||''));
    const last = dVisits[0];
    if (last && last.nextVisitDate) {
      const future = new Date(); future.setDate(future.getDate() + 30);
      if (last.nextVisitDate <= future.toISOString().split('T')[0]) {
        upcoming.push({ dealer: d, date: last.nextVisitDate, reason: last.nextVisitReason, overdue: last.nextVisitDate < todayStr });
      }
    }
  });
  upcoming.sort((a,b) => a.date.localeCompare(b.date));

  // "Dealers Requiring Attention" = your dealers with amber/red health, worst first
  const attention = myDealers.map(d => ({ dealer: d, health: dealerHealth(d) }))
    .filter(x => x.health !== 'green')
    .sort((a,b) => (a.health === 'red' ? 0 : 1) - (b.health === 'red' ? 0 : 1));

  const openItems = myActions.filter(a => a.status !== 'done').sort((a,b) => (isOverdue(b)?1:0) - (isOverdue(a)?1:0)).slice(0,6);

  // Secondary analytics
  const withSales = myVisits.filter(v => v.scores && v.scores.sales);
  const withService = myVisits.filter(v => v.scores && v.scores.service);
  const withParts = myVisits.filter(v => v.scores && v.scores.parts);
  const avgSales = withSales.length ? (withSales.reduce((s,v)=>s+parseFloat(v.scores.sales),0)/withSales.length).toFixed(1) : null;
  const avgService = withService.length ? (withService.reduce((s,v)=>s+parseFloat(v.scores.service),0)/withService.length).toFixed(1) : null;
  const avgParts = withParts.length ? (withParts.reduce((s,v)=>s+parseFloat(v.scores.parts),0)/withParts.length).toFixed(1) : null;
  const recentVisits = myVisits.slice(0,5);

  document.getElementById('dashView').innerHTML = `
    <div class="page-header"><h1>📊 ${isRSM() ? 'Home' : 'Dashboard'}</h1><p>${isRSM() ? `Your ${myDealers.length} assigned dealers — here's what needs you next.` : 'Overview of activity, open items, and performance across all dealers.'}</p></div>

    <div class="form-grid">
      <div class="card">
        <div class="card-title"><div class="card-title-left">📅 Upcoming Visits</div>${canEdit()?`<button class="btn btn-outline btn-sm" onclick="navToNewVisit(document.querySelector('[data-view=wizardView]'))">+ New Visit</button>`:''}</div>
        ${upcoming.length ? upcoming.slice(0,6).map(u => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openDealerProfile('${u.dealer.id}')">
            <div>${healthDot(dealerHealth(u.dealer))} <span style="font-size:13px;font-weight:600">${escapeHtml(u.dealer.name)}</span><div style="font-size:11px;color:var(--text-muted);margin-left:18px">${escapeHtml(u.reason || 'Planned visit')}</div></div>
            <span class="badge ${u.overdue?'badge-red':'badge-orange'}">${u.overdue?'Overdue · ':''}${u.date}</span>
          </div>`).join('') : '<div class="empty-state" style="padding:20px"><p>Nothing planned in the next 30 days</p></div>'}
      </div>
      <div class="card">
        <div class="card-title"><div class="card-title-left">🚦 Dealers Requiring Attention</div></div>
        ${attention.length ? attention.slice(0,6).map(x => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openDealerProfile('${x.dealer.id}')">
            <div style="display:flex;align-items:center;gap:8px">${healthDot(x.health, 12)} <span style="font-size:13px;font-weight:600">${escapeHtml(x.dealer.name)}</span></div>
            <span style="font-size:11px;color:var(--text-muted)">${healthLabel(x.health)}</span>
          </div>`).join('') : `<div class="empty-state" style="padding:20px"><div class="icon">✅</div><p>All ${myDealers.length} dealers are healthy</p></div>`}
      </div>
    </div>

    <div class="card">
      <div class="card-title"><div class="card-title-left">✅ Open Action Items</div><button class="btn btn-outline btn-sm" onclick="switchView('actionsView', document.querySelector('[data-view=actionsView]'))">View All${openAI>6?` (${openAI})`:''}</button></div>
      ${openItems.length ? openItems.map(renderActionItemRow).join('') : '<div class="empty-state" style="padding:24px"><div class="icon">✅</div><h3>All clear!</h3></div>'}
    </div>

    <div class="page-header" style="margin-top:8px"><p style="font-size:12px;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;color:var(--text-muted)">More Insights</p></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Total Visits</div><div class="stat-sub">${thisMonthVisits} this month</div></div>
      <div class="stat-card"><div class="stat-number">${myDealers.length}</div><div class="stat-label">${isRSM() ? 'Assigned Dealers' : 'Unique Dealers'}</div></div>
      <div class="stat-card"><div class="stat-number" style="color:var(--danger)">${openAI}</div><div class="stat-label">Open Action Items</div><div class="stat-sub" style="color:var(--danger)">${overdueAI>0?overdueAI+' overdue':''}</div></div>
      <div class="stat-card"><div class="stat-number" style="font-size:24px">${avgSales||'—'}</div><div class="stat-label">Avg Sales Score</div></div>
    </div>

    <div class="form-grid">
      <div class="card"><div class="card-title"><div class="card-title-left">📊 Avg Department Scores</div></div>
        ${[{label:'🚜 Sales',val:avgSales,color:'var(--kubota-orange)'},{label:'🔧 Service',val:avgService,color:'var(--blue)'},{label:'📦 Parts',val:avgParts,color:'var(--success)'}].map(dept => `
          <div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px"><span>${dept.label}</span><span style="color:${dept.color};font-weight:700">${dept.val||'No data'}</span></div>
          <div style="height:10px;background:#EEEAE4;border-radius:20px;overflow:hidden"><div style="height:100%;border-radius:20px;background:${dept.color};width:${dept.val?(parseFloat(dept.val)/5*100):0}%"></div></div></div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title"><div class="card-title-left">📋 Recent Activity</div></div>
        ${recentVisits.length ? recentVisits.map(v => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="${v.dealer?`openDealerProfile('${v.dealer.id}')`:''}">
            <div><div style="font-size:13px;font-weight:600">${escapeHtml(v.dealerName)}</div><div style="font-size:11px;color:var(--text-muted)">${escapeHtml(v.purpose||'General Visit')}</div></div>
            <div class="badge badge-orange">${v.date}</div>
          </div>`).join('') : '<div class="empty-state"><div class="icon">📋</div><h3>No visits recorded yet</h3></div>'}
      </div>
    </div>
  `;
}

// ====================================================================
// DEALER ROLE — read-only self-service views
// ====================================================================

function myDealerRecord() { return DEALERS_BY_ID[currentUser.dealerId]; }
function myVisibleVisits() { return visits.filter(v => v.dealer && v.dealer.id === currentUser.dealerId && v.visibleToDealer).sort((a,b)=>(b.date||'').localeCompare(a.date||'')); }
function myVisibleActions() { return actionItems.filter(a => a.dealerId === currentUser.dealerId && a.visibleToDealer); }

function renderDealerHome() {
  const d = myDealerRecord();
  const vis = myVisibleVisits();
  const acts = myVisibleActions();
  const openActs = acts.filter(a => a.status !== 'done');
  document.getElementById('dealerHomeView').innerHTML = `
    <div class="page-header"><h1>👋 Welcome, ${escapeHtml(d.name)}</h1><p>Here's what your Kubota team has shared with you.</p></div>
    <div class="dealer-info-banner show">
      <div class="dealer-info-item"><label>Your RSM</label><p>${escapeHtml(d.rsmName||'—')}</p><div class="email">${escapeHtml(d.rsmEmail||'')}</div></div>
      <div class="dealer-info-item"><label>Your DSTM</label><p>${escapeHtml(d.dstmName||'—')}</p><div class="email">${escapeHtml(d.dstmEmail||'')}</div></div>
      <div class="dealer-info-item"><label>Location</label><p>${escapeHtml(d.city)}, ${escapeHtml(d.state)}</p></div>
      <div class="dealer-info-item"><label>Dealer ID</label><p>${escapeHtml(d.id)}</p></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${vis.length}</div><div class="stat-label">Visits Shared With You</div></div>
      <div class="stat-card"><div class="stat-number" style="color:${openActs.length?'var(--danger)':'var(--success)'}">${openActs.length}</div><div class="stat-label">Open Action Items</div></div>
      <div class="stat-card"><div class="stat-number">${vis[0]?vis[0].date:'—'}</div><div class="stat-label">Most Recent Visit</div></div>
    </div>
    <div class="card"><div class="card-title"><div class="card-title-left">✅ Your Open Action Items</div></div>
      ${openActs.length ? openActs.map(renderActionItemRow).join('') : '<div class="empty-state" style="padding:24px"><div class="icon">✅</div><h3>Nothing pending</h3></div>'}
    </div>
    <div class="card"><div class="card-title"><div class="card-title-left">📋 Most Recent Visit Summary</div></div>
      ${vis[0] ? renderDealerVisitSummary(vis[0]) : '<div class="empty-state"><div class="icon">📁</div><h3>No visits shared yet</h3><p>Your RSM will share visit summaries here</p></div>'}
    </div>
  `;
}

function renderDealerVisitSummary(v) {
  return `
    <div style="margin-bottom:10px"><span class="badge badge-orange">${v.date}</span> ${v.dealerRating?`<span class="dealer-rating-badge rating-${v.dealerRating}" style="width:26px;height:26px;font-size:12px;display:inline-flex;margin-left:8px;vertical-align:middle;">${v.dealerRating}</span>`:''}</div>
    <p style="font-size:13px;margin-bottom:8px"><strong>Purpose:</strong> ${escapeHtml(v.purpose||'—')}</p>
    ${v.keyOpps ? `<p style="font-size:13px;margin-bottom:8px"><strong>Key Opportunities/Challenges:</strong> ${escapeHtml(v.keyOpps)}</p>` : ''}
    ${v.followUps ? `<p style="font-size:13px;margin-bottom:8px"><strong>Follow-Up Actions:</strong> ${escapeHtml(v.followUps)}</p>` : ''}
    ${(v.attachments&&v.attachments.length) ? `<div style="margin-top:12px"><strong style="font-size:12px">Attachments:</strong><div class="attach-list">${v.attachments.map(a=>renderAttachmentItem(a,false)).join('')}</div></div>` : ''}
  `;
}

function renderDealerVisits() {
  const vis = myVisibleVisits();
  document.getElementById('dealerVisitsView').innerHTML = `
    <div class="page-header"><h1>📁 Your Visit History</h1><p>Visits your RSM has chosen to share with you.</p></div>
    <div class="card">
      ${vis.length ? vis.map(v => `<div class="card" style="background:#FAFAF8">${renderDealerVisitSummary(v)}</div>`).join('') : '<div class="empty-state"><div class="icon">📁</div><h3>No visits shared yet</h3></div>'}
    </div>
  `;
}

function renderDealerActions() {
  const acts = myVisibleActions();
  document.getElementById('dealerActionsView').innerHTML = `
    <div class="page-header"><h1>✅ Your Action Items</h1><p>Tasks and follow-ups your RSM has shared with you.</p></div>
    <div class="card">${acts.length ? acts.map(renderActionItemRow).join('') : '<div class="empty-state"><div class="icon">✅</div><h3>Nothing here yet</h3></div>'}</div>
  `;
}

// ====================================================================
// INIT
// ====================================================================
document.addEventListener('DOMContentLoaded', initLogin);

// Register service worker for offline support + installability.
// Silently no-ops on file:// previews (SW registration requires HTTPS or localhost).
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {
      // Expected on local file:// preview — works once hosted over HTTPS.
    });
  });
}
</script>
</body>
</html>
